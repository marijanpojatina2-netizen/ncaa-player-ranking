<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🏀 NCAA Filter — slajderi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* touch-action: pan-y => vertical drag scrolls the page, only horizontal drag moves the slider */
    input[type=range]{ width:100%; touch-action:pan-y; height:26px; }
    th{ position:sticky; top:0; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100">
  <div class="max-w-6xl mx-auto p-3">
    <h1 class="text-lg sm:text-xl font-bold mb-1">🏀 NCAA Player Filter
      <span class="text-slate-400 text-xs font-normal">— sam filtriraj podatke sliderima</span>
    </h1>
    <p id="status" class="text-xs text-slate-400 mb-3">Učitavam podatke…</p>

    <!-- Top selects -->
    <div class="grid grid-cols-3 gap-2 mb-3">
      <label class="text-xs">Sezona
        <select id="season" class="w-full mt-1 bg-slate-800 rounded p-1.5 text-sm"></select>
      </label>
      <label class="text-xs">Godina (class)
        <select id="cls" class="w-full mt-1 bg-slate-800 rounded p-1.5 text-sm"></select>
      </label>
      <label class="text-xs">Sortiraj po
        <select id="sortby" class="w-full mt-1 bg-slate-800 rounded p-1.5 text-sm"></select>
      </label>
    </div>
    <!-- Position chips (multi-select) -->
    <div class="text-xs mb-1">Pozicija <span class="text-slate-500">(tapni više; ništa = sve)</span></div>
    <div id="position" class="flex flex-wrap gap-1.5 mb-3"></div>
    <input id="search" placeholder="🔎 traži po imenu ili ekipi…"
           class="w-full bg-slate-800 rounded p-2 text-sm mb-3" />

    <!-- Sliders -->
    <div id="sliders" class="grid grid-cols-1 sm:grid-cols-2 gap-x-5 gap-y-3 mb-4"></div>

    <div class="flex items-center justify-between mb-2">
      <span id="count" class="text-sm font-semibold"></span>
      <button id="reset" class="text-xs bg-slate-700 hover:bg-slate-600 rounded px-3 py-1">Reset svih</button>
    </div>

    <p class="text-xs text-slate-500 mt-1 mb-1">💡 tapni igrača za sve statistike po sezonama</p>
    <div class="overflow-auto rounded border border-slate-700" style="max-height:70vh">
      <table class="w-full text-xs sm:text-sm">
        <thead class="bg-slate-800 text-slate-300"><tr id="thead"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Player detail modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-start justify-center p-3 overflow-auto">
    <div class="bg-slate-800 rounded-lg max-w-3xl w-full p-4 my-4 border border-slate-700">
      <div class="flex justify-between items-start mb-3">
        <div>
          <h2 id="m_name" class="text-lg font-bold"></h2>
          <p id="m_sub" class="text-xs text-slate-400"></p>
        </div>
        <button id="m_close" class="text-slate-300 hover:text-white text-3xl leading-none px-2 -mt-1">&times;</button>
      </div>
      <div class="overflow-auto" style="max-height:75vh">
        <table id="m_table" class="w-full text-xs sm:text-sm"></table>
      </div>
    </div>
  </div>

<script>
// Each slider: key, label, min, max, step, and direction ('min' = keep >= value, 'max' = keep <= value).
const SLIDERS = [
  {key:'pts_pg',   label:'Poeni / ut (min)',     min:0,  max:28, step:0.5, dir:'min'},
  {key:'reb_pg',   label:'Skokovi / ut (min)',   min:0,  max:14, step:0.5, dir:'min'},
  {key:'ast_pg',   label:'Asist. / ut (min)',    min:0,  max:10, step:0.5, dir:'min'},
  {key:'stl_pg',   label:'Ukradene / ut (min)',  min:0,  max:3.5,step:0.1, dir:'min'},
  {key:'blk_pg',   label:'Blokade / ut (min)',   min:0,  max:4.5,step:0.1, dir:'min'},
  {key:'min_pg',   label:'Minute / ut (min)',    min:0,  max:40, step:1,   dir:'min'},
  {key:'ts_pct',   label:'True Shooting % (min)',min:0,  max:75, step:1,   dir:'min'},
  {key:'bpm',      label:'BPM (min)',            min:-8, max:8,  step:0.5, dir:'min'},
  {key:'height_in',label:'Visina (min)',         min:60, max:90, step:1,   dir:'min', fmt:'ht'},
  {key:'to_pct',   label:'Turnover % (max)',     min:0,  max:40, step:1,   dir:'max'},
];
// Columns shown in the table.
const COLS = [
  {key:'name',label:'Igrač'},{key:'team',label:'Ekipa'},{key:'position',label:'Poz'},
  {key:'class',label:'Cls'},{key:'pts_pg',label:'PTS',n:1},{key:'reb_pg',label:'REB',n:1},
  {key:'ast_pg',label:'AST',n:1},{key:'stl_pg',label:'STL',n:1},{key:'blk_pg',label:'BLK',n:1},
  {key:'min_pg',label:'MIN',n:1},{key:'ts_pct',label:'TS%',n:1},{key:'bpm',label:'BPM',n:1},
  {key:'height_in',label:'HT',fmt:'ht'},
];
// Detail rows shown in the per-player modal (all seasons as columns).
// t: num0/num1 = number, pct100 = value already 0-100, frac = value 0-1 -> %, text, ht
const DETAIL = [
  {key:'team',label:'Ekipa',t:'text'},
  {key:'class',label:'Godina (class)',t:'text'},
  {key:'conference',label:'Konferencija',t:'text'},
  {key:'gp',label:'Utakmice',t:'num0'},
  {key:'min_pg',label:'Minute / ut',t:'num1'},
  {key:'pts_pg',label:'Poeni / ut',t:'num1'},
  {key:'reb_pg',label:'Skokovi / ut',t:'num1'},
  {key:'oreb_pg',label:'Napadački skok / ut',t:'num1'},
  {key:'dreb_pg',label:'Obrambeni skok / ut',t:'num1'},
  {key:'ast_pg',label:'Asistencije / ut',t:'num1'},
  {key:'stl_pg',label:'Ukradene / ut',t:'num1'},
  {key:'blk_pg',label:'Blokade / ut',t:'num1'},
  {key:'to_pct',label:'Turnover %',t:'pct100'},
  {key:'fg2_pct',label:'2P %',t:'frac'},
  {key:'fg3_pct',label:'3P %',t:'frac'},
  {key:'ft_pct',label:'Slobodna bacanja %',t:'frac'},
  {key:'efg_pct',label:'eFG %',t:'pct100'},
  {key:'ts_pct',label:'True Shooting %',t:'pct100'},
  {key:'usage',label:'Usage %',t:'pct100'},
  {key:'ortg',label:'ORtg (napadački)',t:'num1'},
  {key:'drtg',label:'DRtg (obrambeni)',t:'num1'},
  {key:'bpm',label:'BPM',t:'num1'},
  {key:'orb_pct',label:'ORB %',t:'pct100'},
  {key:'drb_pct',label:'DRB %',t:'pct100'},
  {key:'ast_pct',label:'AST %',t:'pct100'},
  {key:'stl_pct',label:'STL %',t:'pct100'},
  {key:'blk_pct',label:'BLK %',t:'pct100'},
  {key:'height_in',label:'Visina',t:'ht'},
  {key:'weight_lb',label:'Težina (lb)',t:'num0'},
];
const MAX_ROWS = 300;
let PLAYERS = [];
const byPid = {}; // torvik_pid -> [season rows]
const state = {};
const selectedPos = new Set(); // empty = all positions

function fmtDetail(v, t){
  if(v==null || v==='') return '—';
  switch(t){
    case 'text':  return v;
    case 'num0':  return Math.round(v);
    case 'num1':  return Number(v).toFixed(1);
    case 'pct100':return Number(v).toFixed(1)+'%';
    case 'frac':  return (Number(v)*100).toFixed(1)+'%';
    case 'ht':    return ht(v);
    default:      return v;
  }
}

function openPlayer(pid){
  const rows=(byPid[pid]||[]).slice().sort((a,b)=>a.season-b.season);
  if(!rows.length) return;
  const last=rows[rows.length-1];
  const n=rows.length;
  document.getElementById('m_name').textContent = last.name;
  document.getElementById('m_sub').textContent =
    `${last.position||'?'} · ${ht(last.height_in)||'?'} · ${n} ${n===1?'sezona':(n<5?'sezone':'sezona')} u bazi`;
  let html='<thead><tr class="text-slate-400 bg-slate-800"><th class="text-left px-2 py-1 sticky left-0 bg-slate-800">Statistika</th>'+
    rows.map(r=>`<th class="text-right px-2 py-1">${r.season}</th>`).join('')+'</tr></thead><tbody>';
  DETAIL.forEach(d=>{
    html+=`<tr class="odd:bg-slate-900/40"><td class="px-2 py-1 text-slate-300 sticky left-0 odd:bg-slate-900/40 even:bg-slate-800">${d.label}</td>`+
      rows.map(r=>`<td class="px-2 py-1 text-right font-mono">${fmtDetail(r[d.key],d.t)}</td>`).join('')+'</tr>';
  });
  html+='</tbody>';
  document.getElementById('m_table').innerHTML=html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modal').classList.add('hidden'); }

function ht(inch){ if(inch==null) return ''; const f=Math.floor(inch/12), i=Math.round(inch-12*f); return f+"'"+i+'"'; }
function fmtVal(v, c){ if(v==null) return '—'; if(c.fmt==='ht') return ht(v); if(c.n!=null) return Number(v).toFixed(c.n); return v; }

function buildSliders(){
  const wrap = document.getElementById('sliders');
  wrap.innerHTML = '';
  SLIDERS.forEach(s=>{
    state[s.key] = s.dir==='max' ? s.max : s.min; // default = no filter
    const id='s_'+s.key;
    const div=document.createElement('div');
    div.innerHTML = `<div class="flex justify-between text-xs mb-1">
        <span>${s.label}</span><span id="${id}_v" class="text-emerald-400 font-mono"></span></div>
        <input type="range" id="${id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${state[s.key]}">`;
    wrap.appendChild(div);
    const inp=div.querySelector('input');
    const valEl=document.getElementById(id+'_v');
    const apply=()=>{ state[s.key]=parseFloat(inp.value);
      valEl.textContent = (s.fmt==='ht'?ht(state[s.key]):state[s.key]); render(); };
    // Mobile guard: ignore taps and vertical (scroll) gestures.
    // The slider value only changes on a clearly HORIZONTAL drag; otherwise we revert it.
    let lock=false, sx=0, sy=0, sv=inp.value, decided=false;
    inp.addEventListener('touchstart', e=>{
      const t=e.touches[0]; sx=t.clientX; sy=t.clientY; sv=inp.value; decided=false; lock=true;
    }, {passive:true});
    inp.addEventListener('touchmove', e=>{
      const t=e.touches[0], dx=Math.abs(t.clientX-sx), dy=Math.abs(t.clientY-sy);
      if(!decided && (dx>8 || dy>8)){ decided=true; lock = dy>=dx; } // horizontal => unlock
      if(lock) inp.value=sv; // keep reverting while it's a tap/scroll
    }, {passive:true});
    inp.addEventListener('touchend', ()=>{ lock=false; decided=false; });
    inp.addEventListener('input', ()=>{ if(lock){ inp.value=sv; return; } apply(); });
    apply();
  });
}

function fillSelect(id, vals, allLabel){
  const el=document.getElementById(id);
  el.innerHTML = `<option value="">${allLabel}</option>` + vals.map(v=>`<option>${v}</option>`).join('');
}

function buildPosChips(vals){
  const wrap=document.getElementById('position');
  wrap.innerHTML='';
  vals.forEach(v=>{
    const b=document.createElement('button');
    b.type='button'; b.dataset.pos=v; b.textContent=v;
    b.className='px-3 py-1 rounded-full text-sm bg-slate-800 text-slate-300 border border-slate-700';
    b.addEventListener('click',()=>{
      if(selectedPos.has(v)) selectedPos.delete(v); else selectedPos.add(v);
      paintPosChips(); render();
    });
    wrap.appendChild(b);
  });
  paintPosChips();
}
function paintPosChips(){
  document.querySelectorAll('#position button').forEach(b=>{
    const on=selectedPos.has(b.dataset.pos);
    b.className='px-3 py-1 rounded-full text-sm border '+
      (on?'bg-emerald-500 text-slate-900 border-emerald-400 font-semibold'
         :'bg-slate-800 text-slate-300 border-slate-700');
  });
}

function passes(p){
  for(const s of SLIDERS){
    const v=p[s.key];
    if(s.dir==='min'){ if(state[s.key]>s.min && (v==null || v<state[s.key])) return false; }
    else { if(state[s.key]<s.max && (v==null || v>state[s.key])) return false; }
  }
  if(season.value && String(p.season)!==season.value) return false;
  if(selectedPos.size && !selectedPos.has(p.position)) return false;
  if(cls.value && p.class!==cls.value) return false;
  const q=search.value.trim().toLowerCase();
  if(q && !((p.name||'').toLowerCase().includes(q) || (p.team||'').toLowerCase().includes(q))) return false;
  return true;
}

function render(){
  const sk=sortby.value||'pts_pg';
  let rows=PLAYERS.filter(passes);
  rows.sort((a,b)=>((b[sk]??-1e9)-(a[sk]??-1e9)));
  document.getElementById('count').textContent =
    `${rows.length} igrača odgovara` + (rows.length>MAX_ROWS?` (prikazano prvih ${MAX_ROWS})`:``);
  const tb=document.getElementById('tbody');
  tb.innerHTML = rows.slice(0,MAX_ROWS).map(p=>`<tr data-pid="${p.torvik_pid}" class="odd:bg-slate-800/40 cursor-pointer hover:bg-emerald-900/40">`+
    COLS.map(c=>`<td class="px-2 py-1 ${typeof p[c.key]==='number'?'text-right font-mono':''}">${fmtVal(p[c.key],c)}</td>`).join('')+`</tr>`).join('');
}

// Open detail modal when a row is tapped.
document.getElementById('tbody').addEventListener('click', e=>{
  const tr=e.target.closest('tr[data-pid]');
  if(tr) openPlayer(tr.dataset.pid);
});
document.getElementById('m_close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

['season','cls','sortby','search'].forEach(id=>
  document.addEventListener('input', e=>{ if(e.target.id===id) render(); }));

document.getElementById('reset').addEventListener('click', ()=>{
  season.value=''; cls.value=''; search.value='';
  selectedPos.clear(); paintPosChips();
  buildSliders(); render();
});

(async function(){
  try{
    const d = await fetch('./data.json').then(r=>r.json());
    PLAYERS = d.players || d;
    PLAYERS.forEach(p=>{ (byPid[p.torvik_pid] = byPid[p.torvik_pid] || []).push(p); });
    document.getElementById('thead').innerHTML = COLS.map(c=>`<th class="px-2 py-1 text-left">${c.label}</th>`).join('');
    fillSelect('season', [...new Set(PLAYERS.map(p=>p.season))].sort((a,b)=>b-a), 'Sve sezone');
    buildPosChips([...new Set(PLAYERS.map(p=>p.position).filter(Boolean))].sort());
    fillSelect('cls', ['Fr','So','Jr','Sr'], 'Sve godine');
    sortby.innerHTML = COLS.filter(c=>c.n!=null||c.key==='bpm'||c.key==='ts_pct')
      .map(c=>`<option value="${c.key}">${c.label}</option>`).join('');
    season.value = String(Math.max(...PLAYERS.map(p=>p.season))); // default latest season
    buildSliders();
    document.getElementById('status').textContent =
      `Učitano ${PLAYERS.length.toLocaleString()} igrača (${d.generated_from||'Bart Torvik + ESPN'}). Sve filtriranje je u tvom pregledniku.`;
    render();
  }catch(e){
    document.getElementById('status').textContent = 'Greška pri učitavanju data.json: '+e;
  }
})();
</script>
</body>
</html>
