name: Diagnose NCAA D2 sources

# Throwaway diagnostic: dumps the raw ncaa.com D2 stats page to data/diag/ and
# commits it, so it can be analyzed locally. Trigger by touching
# .github/d2-diag-trigger.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/d2-diag-trigger"

permissions:
  contents: write

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install requests
        run: pip install requests
      - name: Dump sources
        run: python -m ingest.diag_sources
      - name: Commit diag artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/diag/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "diag: dump ncaa.com D2 stats page"
            git push origin HEAD:main
          fi
