name: Build NCAA database

# Manual, one-time-ish build. GitHub-hosted runners have open internet, so the
# scrape of Bart Torvik + ESPN rosters runs here even on accounts without a VPS.
# The finished SQLite DB and a portable JSON export are committed back to the
# branch. The data is concluded, so this is NOT scheduled.
#
# Two ways to run it:
#   * Actions tab -> "Run workflow" (workflow_dispatch), or
#   * push a commit that touches .github/build-trigger on main (handy when you
#     only have a phone: editing that file fires the build, which then commits
#     the data back to main). The data commit itself does not touch the trigger
#     file, so it never re-triggers the workflow.

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Seasons to scrape (space-separated, Torvik year convention)"
        required: true
        default: "2023 2024 2025 2026"
      refresh:
        description: "Bypass HTTP cache"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - ".github/build-trigger"

permissions:
  contents: write

# Tag pushes carry no inputs, so fall back to sensible defaults.
env:
  SEASONS: ${{ github.event.inputs.seasons || '2023 2024 2025 2026' }}
  REFRESH: ${{ github.event.inputs.refresh || 'false' }}
  # barttorvik sits behind CloudFront, which blocks datacenter IPs (GitHub
  # runners AND plain CORS proxies) with HTTP 403 / error pages. r.jina.ai
  # renders with a real browser so it gets through; allorigins is a fallback.
  # Responses are validated as CSV (see common._looks_like_csv) so a blocked
  # HTML page is rejected rather than cached. ESPN is fetched directly.
  FETCH_PROXIES: "https://r.jina.ai/{rawurl} https://api.allorigins.win/raw?url={url}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inspect Torvik column layout (sanity log)
        run: python -m ingest.torvik_d1 --season $(echo "$SEASONS" | awk '{print $NF}') --inspect || true

      - name: Scrape Torvik (multi-season)
        run: |
          REFRESH_FLAG=""
          if [ "$REFRESH" = "true" ]; then REFRESH_FLAG="--refresh"; fi
          python -m ingest.torvik_d1 --seasons $SEASONS $REFRESH_FLAG

      - name: Enrich with ESPN rosters (position/height/weight)
        run: python -m ingest.espn_roster --seasons $SEASONS || echo "ESPN enrichment failed (non-fatal)"

      - name: Export portable JSON
        run: python -m ingest.export_json

      - name: Commit built database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ncaa.db web/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: build NCAA DB for seasons $SEASONS"
            git push origin HEAD:main
          fi
